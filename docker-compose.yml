services:
  db:
    image: mysql:latest
    container_name: slogo_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-slogo_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slogo_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    depends_on:
      - db

volumes:
  db_data:
